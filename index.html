<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FIO App Ranking</title>
  <style>
    :root {
      --bg: #f7f8fa;
      --panel: #ffffff;
      --text: #18202a;
      --muted: #647084;
      --line: #d9dee7;
      --accent: #0f766e;
      --accent-dark: #115e59;
      --danger: #b42318;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, sans-serif;
    }

    header {
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }

    .wrap {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 0;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
    }

    .status {
      color: var(--muted);
      font-size: 14px;
      min-height: 20px;
      text-align: right;
    }

    main {
      padding: 24px 0 40px;
    }

    .actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-bottom: 12px;
    }

    select {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel);
      color: var(--text);
      font-size: 14px;
      min-width: 220px;
      padding: 9px 12px;
    }

    button {
      border: 1px solid var(--accent-dark);
      border-radius: 6px;
      background: var(--accent);
      color: #ffffff;
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
      padding: 9px 14px;
    }

    button:disabled {
      cursor: wait;
      opacity: 0.65;
    }

    .table-panel {
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }

    table {
      width: 100%;
      min-width: 960px;
      border-collapse: collapse;
    }

    th,
    td {
      border-bottom: 1px solid var(--line);
      padding: 12px 14px;
      text-align: left;
      white-space: nowrap;
    }

    th {
      background: #eef2f6;
      color: #334155;
      font-size: 13px;
      font-weight: 700;
    }

    td {
      font-size: 14px;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .rank {
      width: 72px;
      font-weight: 700;
    }

    .score {
      font-variant-numeric: tabular-nums;
      font-weight: 700;
    }

    .muted {
      color: var(--muted);
    }

    .error {
      color: var(--danger);
      font-weight: 700;
    }

    @media (max-width: 720px) {
      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .status {
        text-align: left;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap topbar">
      <h1>FIO App Ranking</h1>
      <div id="status" class="status">Loading...</div>
    </div>
  </header>

  <main class="wrap">
    <div class="actions">
      <select id="jobSelect" aria-label="Ranking target">
        <option value="overall">Overall</option>
      </select>
      <button id="refreshBtn" type="button">Refresh</button>
    </div>

    <section class="table-panel">
      <table>
        <thead>
          <tr>
            <th class="rank">Rank</th>
            <th>Device</th>
            <th>AP</th>
            <th>RAM</th>
            <th>Storage</th>
            <th>Score</th>
            <th>Date</th>
          </tr>
        </thead>
        <tbody id="rankingBody">
          <tr>
            <td colspan="7" class="muted">Loading ranking data...</td>
          </tr>
        </tbody>
      </table>
    </section>
  </main>

  <script type="module">
    const RESULT_LIMIT = 100;
    const CATALOG_URL = "device_catalog.json";
    const JOB_CATALOG_URL = "job_catalog.json";
    const LEADERBOARD_URL = "https://us-central1-ffff-30cb6.cloudfunctions.net/leaderboard";

    const statusEl = document.getElementById("status");
    const rankingBody = document.getElementById("rankingBody");
    const refreshBtn = document.getElementById("refreshBtn");
    const jobSelect = document.getElementById("jobSelect");
    let deviceCatalog = { soc: {}, storage: { modelContains: [] } };

    refreshBtn.addEventListener("click", loadRanking);
    jobSelect.addEventListener("change", loadRanking);

    async function loadRanking() {
      setLoading(true);

      try {
        await ensureCatalogs();
        const uniqueRows = dedupeRows(await fetchRankingRows());
        renderRanking(uniqueRows);
        setStatus(`Loaded ${uniqueRows.length} ${rankingLabel()} submissions`, false);
      } catch (error) {
        console.error(error);
        rankingBody.innerHTML = `<tr><td colspan="7" class="error">${escapeHtml(error.message)}</td></tr>`;
        setStatus("Load failed", true);
      } finally {
        setLoading(false);
      }
    }

    async function fetchRankingRows() {
      const params = new URLSearchParams({
        limit: String(RESULT_LIMIT),
        type: selectedType(),
      });
      if (selectedType() === "job") {
        params.set("jobName", jobSelect.value);
      }

      const response = await fetch(`${LEADERBOARD_URL}?${params.toString()}`, {
        cache: "no-store",
      });
      const body = await response.json();
      if (!response.ok || !body.ok) {
        throw new Error(body.message || body.error || `leaderboard http=${response.status}`);
      }
      return body.results || [];
    }

    function renderRanking(rows) {
      if (!rows.length) {
        rankingBody.innerHTML = `<tr><td colspan="7" class="muted">No ${escapeHtml(rankingLabel())} submissions yet.</td></tr>`;
        return;
      }

      rankingBody.innerHTML = rows.map((row, index) => `
        <tr>
          <td class="rank">${index + 1}</td>
          <td>${escapeHtml(deviceLabel(row))}</td>
          <td>${escapeHtml(apLabel(row.deviceInfo))}</td>
          <td>${escapeHtml(memoryLabel(row.deviceInfo))}</td>
          <td>${escapeHtml(storageLabel(row.deviceInfo))}</td>
          <td class="score">${escapeHtml(metricLabel(row))}</td>
          <td>${escapeHtml(formatDate(row.timestamp, row.timestamp_ms))}</td>
        </tr>
      `).join("");
    }

    function dedupeRows(rows) {
      const seen = new Set();
      const unique = [];

      for (const row of rows) {
        const key = `${row.uid || ""}|${stableScore(row.score)}`;
        if (seen.has(key)) continue;
        seen.add(key);
        unique.push(row);
      }

      return unique;
    }

    function stableScore(value) {
      const number = Number(value);
      if (!Number.isFinite(number)) return "";
      return number.toFixed(6);
    }

    async function fetchDeviceCatalog() {
      try {
        const response = await fetch(CATALOG_URL, { cache: "no-store" });
        if (!response.ok) throw new Error(`catalog http=${response.status}`);
        return await response.json();
      } catch (error) {
        console.warn("device catalog unavailable", error);
        return { soc: {}, storage: { modelContains: [] } };
      }
    }

    async function ensureCatalogs() {
      if (!deviceCatalog.loaded) {
        deviceCatalog = await fetchDeviceCatalog();
        deviceCatalog.loaded = true;
      }
      if (jobSelect.options.length <= 1) {
        await loadJobOptions();
      }
    }

    async function loadJobOptions() {
      const response = await fetch(JOB_CATALOG_URL, { cache: "no-store" });
      if (!response.ok) throw new Error(`job catalog http=${response.status}`);
      const jobs = await response.json();

      for (const job of jobs) {
        const option = document.createElement("option");
        option.value = job.test_name;
        option.textContent = `${job.test_name} (${Number(job.weight || 0).toFixed(2)})`;
        jobSelect.appendChild(option);
      }
    }

    function selectedType() {
      return jobSelect.value === "overall" ? "overall" : "job";
    }

    function rankingLabel() {
      return selectedType() === "overall" ? "overall" : jobSelect.value;
    }

    function deviceLabel(row) {
      return row.deviceInfo?.display?.deviceLabel
        || row.deviceInfo?.model
        || row.model
        || "-";
    }

    function apLabel(deviceInfo) {
      const ap = deviceInfo?.ap || {};
      const mapped = mapSoc(ap.socModel || ap.boardPlatform || ap.hardware);
      return deviceInfo?.display?.apName
        || mapped?.name
        || ap.socName
        || ap.socModel
        || ap.boardPlatform
        || ap.hardware
        || "-";
    }

    function memoryLabel(deviceInfo) {
      const memory = deviceInfo?.memory || {};
      if (deviceInfo?.display?.ram) return deviceInfo.display.ram;
      if (memory.totalGBRounded) return `${memory.totalGBRounded}GB RAM`;
      return "-";
    }

    function storageLabel(deviceInfo) {
      const storage = deviceInfo?.storage || {};
      if (deviceInfo?.display?.storage) return deviceInfo.display.storage;

      const mappedType = mapStorage(storage.model, storage.vendor, storage.blockName);
      const type = mappedType || storage.type || "";
      const size = storage.totalGBRounded ? `${storage.totalGBRounded}GB` : "";
      return [type, size].filter(Boolean).join(" ") || "-";
    }

    function metricLabel(row) {
      if (selectedType() === "job") {
        const bw = Number(row.bw || row.score);
        const iops = Number(row.iops || 0);
        const bwText = Number.isFinite(bw) ? `${Math.round(bw).toLocaleString("en-US")} MB/s` : "-";
        const iopsText = Number.isFinite(iops) && iops > 0
          ? ` / ${Math.round(iops).toLocaleString("en-US")} IOPS`
          : "";
        return `${bwText}${iopsText}`;
      }
      return formatScore(row.score);
    }

    function mapSoc(value) {
      const key = normalizeKey(value);
      if (!key) return null;
      if (deviceCatalog.soc?.[key]) return deviceCatalog.soc[key];

      for (const [catalogKey, entry] of Object.entries(deviceCatalog.soc || {})) {
        if (key.includes(catalogKey)) return entry;
      }

      return null;
    }

    function mapStorage(...values) {
      const text = values.filter(Boolean).join(" ").toLowerCase();
      for (const rule of deviceCatalog.storage?.modelContains || []) {
        if (rule.contains && text.includes(String(rule.contains).toLowerCase())) {
          return rule.type;
        }
      }
      return "";
    }

    function normalizeKey(value) {
      return String(value || "").toLowerCase().replace(/[^a-z0-9]/g, "");
    }

    function setLoading(isLoading) {
      refreshBtn.disabled = isLoading;
      if (isLoading) {
        setStatus("Loading...", false);
      }
    }

    function setStatus(text, isError) {
      statusEl.textContent = text;
      statusEl.classList.toggle("error", isError);
    }

    function formatScore(value) {
      const number = Number(value);
      if (!Number.isFinite(number)) return "-";
      return Math.round(number).toLocaleString("en-US");
    }

    function formatDate(timestamp, timestampMs) {
      if (timestamp && /^\d{8}_/.test(timestamp)) {
        return `${timestamp.slice(0, 4)}-${timestamp.slice(4, 6)}-${timestamp.slice(6, 8)}`;
      }

      if (timestamp) return timestamp.split(" ")[0];

      const millis = Number(timestampMs);
      if (Number.isFinite(millis) && millis > 0) {
        return new Date(millis).toISOString().slice(0, 10);
      }

      return "-";
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    loadRanking();
  </script>
</body>
</html>
